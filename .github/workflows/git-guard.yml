name: git-guard
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: git-guard injection/secret scan
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$base" 2>/dev/null; then
            base=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
          fi
          changed=$(git diff --name-only --diff-filter=ACM "$base" HEAD)
          echo "Changed files:"; echo "$changed"
          if [ -z "$changed" ]; then echo "no files to scan"; exit 0; fi
          python3 .github/git-guard-scan.py files $changed
